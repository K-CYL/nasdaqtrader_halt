name: Update halt state

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nasdaq-halt-bot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout alert repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: |
          git pull --rebase origin main || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot once
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          RSS_URL: ${{ secrets.RSS_URL }}
        run: |
          python rss_to_tg.py

      - name: Commit state and halts in alert repo
        run: |
          if git status --porcelain | grep -E "state.json|halts.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json halts.json
            git commit -m "Update halt state"
            git pull --rebase origin main || true
            git push
          else
            echo "No changes to commit in alert repo"
          fi

      - name: Checkout query bot repo
        uses: actions/checkout@v4
        with:
          repository: K-CYL/telegram-halt-bot
          token: ${{ secrets.QUERY_REPO_PAT }}
          path: query-bot
          fetch-depth: 0

      - name: Copy halts.json to query bot repo
        run: |
          cp halts.json query-bot/halts.json

      - name: Commit halts.json to query bot repo
        run: |
          cd query-bot
          if git status --porcelain | grep -q "halts.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add halts.json
            git commit -m "Update halts.json"
            git pull --rebase origin main || true
            git push
          else
            echo "No halts.json changes in query bot repo"
          fi